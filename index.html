<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111111" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./style.css" />
    <title>譜面ビューア</title>
  </head>
  <body>
    <header id="controls" class="controls visible">
      <div class="row">
        <label class="file-input">
          PDFを開く
          <input id="pdfInput" type="file" accept="application/pdf" />
        </label>
        <button id="saveToLibraryBtn" disabled>ライブラリ保存</button>
        <button id="toggleLibraryBtn">ライブラリ</button>
      </div>

      <div class="row">
        <button id="startBtn">Start</button>
        <button id="pauseBtn">Pause</button>
        <button id="resetBtn">Reset</button>
      </div>

      <div class="row">
        <label>速度(px/ms)
          <input id="speedSlider" type="range" min="0.1" max="5" step="0.1" value="1" />
          <span id="speedValue">1.0</span>
        </label>
      </div>

      <div class="row">
        <label>BPM
          <input id="bpmInput" type="number" min="30" max="300" step="1" value="120" />
        </label>
        <label>1拍あたりpx
          <input id="pixelsPerBeatInput" type="number" min="20" max="500" step="1" value="120" />
        </label>
        <button id="applyBpmBtn">BPM反映</button>
      </div>
      <p id="status">PDFを読み込んでください。</p>
    </header>

    <aside id="libraryPanel" class="library-panel hidden">
      <h2>保存済みライブラリ</h2>
      <form id="tagFilterForm">
        <input id="tagFilterInput" type="text" placeholder="タグで絞り込み" />
        <button type="submit">検索</button>
      </form>
      <ul id="libraryList"></ul>
    </aside>

    <main id="viewerContainer">
      <div id="pages"></div>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
